<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndiaTube</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* Top bar */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:#111;
}

.logo{
font-size:20px;
font-weight:bold;
color:#ff3d00;
}

.icons{
display:flex;
gap:15px;
font-size:18px;
}

/* Tabs */

.tabs{
display:flex;
justify-content:space-around;
border-bottom:1px solid #333;
}

.tabs div{
padding:10px;
color:#aaa;
}

.tabs .active{
color:white;
border-bottom:2px solid white;
}

/* Video area */

.content{
height:500px;
display:flex;
align-items:center;
justify-content:center;
color:#777;
}

/* Bottom navigation */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
padding:8px 0;
}

.bottom div{
text-align:center;
font-size:12px;
color:#aaa;
}

.upload{
background:red;
color:white;
border-radius:50%;
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

</style>
</head>

<body>

<!-- Header -->

<div class="header">

<div class="logo">IndiaTube</div>

<div class="icons">
<header class="header">

<div class="logo-section">
<img src="logo.png">
<div class="logo-text">
India<span>Tube</span>
</div>
</div>

<div class="icons">

<!-- Cast icon -->
<svg width="24" height="24" fill="white" viewBox="0 0 24 24">
<path d="M21 3H3a2 2 0 0 0-2 2v3h2V5h18v14h-6v2h6a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/>
<path d="M1 18v3h3a3 3 0 0 0-3-3z"/>
<path d="M1 14v2a5 5 0 0 1 5 5h2a7 7 0 0 0-7-7z"/>
</svg>

<!-- Bell icon -->
<svg width="24" height="24" fill="white" viewBox="0 0 24 24">
<path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2z"/>
<path d="M18 16v-5a6 6 0 1 0-12 0v5l-2 2v1h16v-1l-2-2z"/>
</svg>

<!-- Search icon -->
<svg width="24" height="24" fill="white" viewBox="0 0 24 24">
<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16a6.471 6.471 0 0 0 4.23-1.57l.27.28v.79l5 5 1.5-1.5-5-5z"/>
</svg>

</div>

</header>
</div>

</div>

<!-- Tabs -->

<div class="tabs">
<div class="active">Videos</div>
<div>Shorts</div>
<div>Feed</div>
</div>

<!-- Content -->

<div class="content">
Videos will appear here
</div>

<!-- Bottom Navigation -->

<div class="bottom">

<div>
🏠
<br>Home
</div>

<div>
🎬
<br>Shorts
</div>

<div class="upload">
+
</div>

<div>
📺
<br>Subscriptions
</div>

<div>
👤
<br>You
</div>

</div>

</body>
</html>
