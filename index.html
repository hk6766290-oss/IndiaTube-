<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndiaTube</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* Top bar */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:#111;
}

.logo{
font-size:20px;
font-weight:bold;
color:#ff3d00;
}

.icons{
display:flex;
gap:15px;
font-size:18px;
}

/* Tabs */

.tabs{
display:flex;
justify-content:space-around;
border-bottom:1px solid #333;
}

.tabs div{
padding:10px;
color:#aaa;
}

.tabs .active{
color:white;
border-bottom:2px solid white;
}

/* Video area */

.content{
height:500px;
display:flex;
align-items:center;
justify-content:center;
color:#777;
}

/* Bottom navigation */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
padding:8px 0;
}

.bottom div{
text-align:center;
font-size:12px;
color:#aaa;
}

.upload{
background:red;
color:white;
border-radius:50%;
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

</style>
</head>

<body>

<!-- Header -->

<div class="header">

<div class="logo">IndiaTube</div>

<div class="icons">
📺
🔔
🔍
</div>

</div>

<!-- Tabs -->

<div class="tabs">
<div class="active">Videos</div>
<div>Shorts</div>
<div>Feed</div>
</div>

<!-- Content -->

<div class="content">
Videos will appear here
</div>

<!-- Bottom Navigation -->

<div class="bottom">

<div>
🏠
<br>Home
</div>

<div>
🎬
<br>Shorts
</div>

<div class="upload">
+
</div>

<div>
📺
<br>Subscriptions
</div>

<div>
👤
<br>You
</div>

</div>

</body>
</html>
