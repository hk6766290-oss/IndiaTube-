<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>IndiaTube</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 12px;
background:#111;
}

.logo-section{
display:flex;
align-items:center;
gap:8px;
}

.logo-circle{
width:30px;
height:30px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.logo-circle img{
width:18px;
mix-blend-mode:multiply;
}

.logo-text{
font-size:20px;
font-weight:bold;
}

.india{color:white;}
.tube{color:#ff6a00;}

.icons{
display:flex;
gap:18px;
cursor:pointer;
}

.icons svg{
fill:white;
}

/* SEARCH */

.search-box{
display:none;
background:#111;
padding:10px;
border-top:1px solid #333;
}

.search-box input{
width:100%;
padding:8px;
background:#222;
border:none;
color:white;
}

/* TABS */

.tabs{
display:flex;
justify-content:space-around;
background:#111;
border-bottom:1px solid #333;
}

.tab{
padding:12px;
color:#aaa;
cursor:pointer;
font-weight:bold;
}

.tab.active{
color:white;
border-bottom:2px solid white;
}

.content{
padding:20px;
}

/* VIDEO GRID */

.video-grid{
display:grid;
grid-template-columns:1fr;
gap:15px;
}

.video-card{
background:#181818;
border-radius:10px;
overflow:hidden;
}

.video-card iframe{
width:100%;
height:200px;
}

.video-title{
padding:10px;
font-size:14px;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #333;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:white;
cursor:pointer;
}

.nav-item.upload{
background:red;
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo-section">

<div class="logo-circle">
<img src="logo.png">
</div>

<div class="logo-text">
<span class="india">India</span><span class="tube">Tube</span>
</div>

</div>

<div class="icons">

<!-- CAST -->
<svg onclick="castScreen()" width="24" height="24" viewBox="0 0 24 24">
<path d="M21 3H3a2 2 0 0 0-2 2v3h2V5h18v14h-6v2h6a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/>
</svg>

<!-- BELL -->
<svg onclick="toggleNotifications()" width="24" height="24" viewBox="0 0 24 24">
<path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2z"/>
</svg>

<!-- SEARCH -->
<svg onclick="toggleSearch()" width="24" height="24" viewBox="0 0 24 24">
<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 
6.5 6.5 0 1 0 9.5 16z"/>
</svg>

</div>

</div>

<!-- SEARCH -->

<div class="search-box" id="searchBox">
<input type="text" placeholder="Search videos...">
</div>

<!-- NOTIFICATION -->

<div id="notifyBox" style="display:none;padding:10px;background:#111;">
No new notifications
</div>

<!-- TABS -->

<div class="tabs">
<div class="tab active" onclick="openTab('videos')">Videos</div>
<div class="tab" onclick="openTab('shorts')">Shorts</div>
<div class="tab" onclick="openTab('feed')">Feed</div>
</div>

<!-- CONTENT -->

<div class="content">

<div id="videos" class="tab-content">

<div class="video-grid">

<div class="video-card">
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"
frameborder="0"
allowfullscreen></iframe>
<div class="video-title">Sample Video 1</div>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ"
frameborder="0"
allowfullscreen></iframe>
<div class="video-title">Sample Video 2</div>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/tgbNymZ7vqY"
frameborder="0"
allowfullscreen></iframe>
<div class="video-title">Sample Video 3</div>
</div>

</div>

</div>

<div id="shorts" class="tab-content" style="display:none">
<h3>Shorts Section</h3>
</div>

<div id="feed" class="tab-content" style="display:none">
<h3>Feed Section</h3>
</div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<div class="nav-item">🏠<span>Home</span></div>

<div class="nav-item">🎬<span>Shorts</span></div>

<div class="nav-item upload">+</div>

<div class="nav-item">📺<span>Subscriptions</span></div>

<div class="nav-item" onclick="openProfile()">👤<span>You</span></div>

</div>

<script>

function toggleSearch(){
let box=document.getElementById("searchBox");
box.style.display = box.style.display==="block" ? "none" : "block";
}

function toggleNotifications(){
let box=document.getElementById("notifyBox");
box.style.display = box.style.display==="block" ? "none" : "block";
}

function castScreen(){
alert("Casting feature coming soon");
}

function openTab(tab){

let tabs=document.querySelectorAll(".tab");
let contents=document.querySelectorAll(".tab-content");

tabs.forEach(t=>t.classList.remove("active"));
contents.forEach(c=>c.style.display="none");

event.target.classList.add("active");
document.getElementById(tab).style.display="block";

}

function openProfile(){
window.location.href="profile.html";
}
<script>

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

</script>
</script>

</body>
</html>
