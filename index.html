<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>IndiaTube</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f1f1;
}

header{
background:#202020;
color:white;
display:flex;
align-items:center;
padding:10px;
}

.logo{
color:red;
font-size:22px;
font-weight:bold;
}

.search{
margin-left:20px;
flex:1;
}

.search input{
width:100%;
padding:8px;
border:none;
border-radius:4px;
}

.videos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:6px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.card img{
width:100%;
}

.title{
padding:10px;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="logo">IndiaTube</div>

<div class="search">
<input type="text" placeholder="Search videos">
</div>

</header>

<div class="videos">

<div class="card">
<img src="https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg">
<div class="title">Sample Video 1</div>
</div>

<div class="card">
<img src="https://img.youtube.com/vi/3JZ_D3ELwOQ/0.jpg">
<div class="title">Sample Video 2</div>
</div>

<div class="card">
<img src="https://img.youtube.com/vi/tgbNymZ7vqY/0.jpg">
<div class="title">Sample Video 3</div>
</div>

</div>

</body>
</html>
